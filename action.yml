name: OpenShock Release Tool
description: Reads .changes/ files, bumps semver, writes release.json, tags the commit.
branding:
  icon: package
  color: blue

inputs:
  mode:
    description: Release mode - 'rc' or 'stable'
    required: true
    options:
      - rc
      - stable
  dry-run:
    description: Preview without making changes (prints JSON to stdout, no tag created)
    required: false
    default: 'false'
  output:
    description: Path to write release.json (relative to the consuming repo root)
    required: false
    default: release.json
  notes-output:
    description: Path to write markdown release notes (relative to the consuming repo root)
    required: false
    default: ''
  prerelease-label:
    description: Override the prerelease label (e.g. rc, alpha, beta). Falls back to .changes/config.json.
    required: false
    default: ''
  git-sha:
    description: Append the short git SHA as build metadata to prerelease tags (e.g. 1.2.3-rc.1+gabc1234).
    required: false
    default: 'false'
  go-version:
    description: Go version to use
    required: false
    default: '1.25'

outputs:
  tag:
    description: The tag that was created (empty when skip=true)
    value: ${{ steps.run.outputs.tag }}
  prerelease:
    description: Whether the created tag is a prerelease
    value: ${{ steps.run.outputs.prerelease }}
  skip:
    description: true when there were no pending changes and no tag was created
    value: ${{ steps.run.outputs.skip }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run release tool
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        RELEASE_MODE: ${{ inputs.mode }}
        RELEASE_OUTPUT: ${{ inputs.output }}
        RELEASE_NOTES: ${{ inputs.notes-output }}
        PRERELEASE_LABEL: ${{ inputs.prerelease-label }}
        GIT_SHA: ${{ inputs.git-sha }}
      run: |
        ARGS=(
          --root   "${{ github.workspace }}"
          --output "${{ github.workspace }}/$RELEASE_OUTPUT"
        )
        if [ -n "$RELEASE_NOTES" ]; then
          ARGS+=(--notes "${{ github.workspace }}/$RELEASE_NOTES")
        fi
        if [ -n "$PRERELEASE_LABEL" ]; then
          ARGS+=(--prerelease-label "$PRERELEASE_LABEL")
        fi
        if [ "$GIT_SHA" = "true" ]; then
          ARGS+=(--git-sha)
        fi
        if [ "$DRY_RUN" = "true" ]; then
          ARGS+=(--dry-run)
        fi
        go run . "${ARGS[@]}" "$RELEASE_MODE"
