name: OpenShock Release Tool
description: Reads .changes/ files, bumps semver, writes release.json, tags the commit.
branding:
  icon: package
  color: blue

inputs:
  mode:
    description: >
      Release mode: 'stable' (consumes .changes, updates CHANGELOG),
      'beta' (prerelease, .changes since last beta or stable tag; use prerelease-label to set label e.g. rc, alpha, beta),
      'develop' (prerelease, .changes since last develop/beta/stable tag, always tags with +sha).
    required: true
    options:
      - stable
      - beta
      - develop
  dry-run:
    description: Preview without making changes (prints JSON to stdout, no tag created)
    required: false
    default: 'false'
  output:
    description: Path to write release.json (relative to the consuming repo root)
    required: false
    default: release.json
  notes-output:
    description: Path to write markdown release notes (relative to the consuming repo root)
    required: false
    default: ''
  prerelease-label:
    description: Override the prerelease label (e.g. rc, alpha, beta). Falls back to .changes/config.json.
    required: false
    default: ''
  git-sha:
    description: Append the short git SHA as build metadata to prerelease tags (e.g. 1.2.3-rc.1+gabc1234).
    required: false
    default: 'false'
  go-version:
    description: Go version to use
    required: false
    default: '1.25'

outputs:
  tag:
    description: The tag that was created (empty when skip=true)
    value: ${{ steps.run.outputs.tag }}
  prerelease:
    description: Whether the created tag is a prerelease
    value: ${{ steps.run.outputs.prerelease }}
  skip:
    description: true when there were no pending changes and no tag was created
    value: ${{ steps.run.outputs.skip }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run release tool
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        RELEASE_MODE: ${{ inputs.mode }}
        RELEASE_OUTPUT: ${{ inputs.output }}
        RELEASE_NOTES: ${{ inputs.notes-output }}
        PRERELEASE_LABEL: ${{ inputs.prerelease-label }}
        GIT_SHA: ${{ inputs.git-sha }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        ARGS=(
          --root   "$WORKSPACE"
          --output "$WORKSPACE/$RELEASE_OUTPUT"
        )
        [ -n "$RELEASE_NOTES" ] && ARGS+=(--notes "$WORKSPACE/$RELEASE_NOTES")
        [ "$DRY_RUN" = "true" ] && ARGS+=(--dry-run)

        case "$RELEASE_MODE" in
          stable)
            go run . "${ARGS[@]}" stable
            ;;
          beta)
            go run . "${ARGS[@]}" rc \
              --prerelease-label "${PRERELEASE_LABEL:-beta}"
            ;;
          develop)
            go run . "${ARGS[@]}" rc \
              --prerelease-label "${PRERELEASE_LABEL:-develop}" \
              --git-sha \
              --allow-empty
            ;;
          *)
            echo "Unknown mode: $RELEASE_MODE" >&2
            exit 1
            ;;
        esac
