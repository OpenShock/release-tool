name: OpenShock Release Tool
description: Reads .changes/ files, bumps semver, writes release.json, tags the commit.
branding:
  icon: package
  color: blue

inputs:
  mode:
    description: >
      'release' reads .changes/config.json branch config to determine behavior (stable, prerelease, or no-tag),
      'status' validates pending changes and prints the next version without creating a tag,
      'check' validates the change files a pull request adds and writes release-check.json.
    required: true
    options:
      - release
      - status
      - check
  dry-run:
    description: Preview without making changes (prints JSON to stdout, no tag created)
    required: false
    default: 'false'
  output:
    description: Path to write release.json (relative to the consuming repo root)
    required: false
    default: release.json
  notes-output:
    description: Path to write markdown release notes (relative to the consuming repo root)
    required: false
    default: ''
  base-ref:
    description: "check mode: PR base branch name (resolved via config.json branches)"
    required: false
    default: ${{ github.event.pull_request.base.ref }}
  base-sha:
    description: "check mode: base commit to diff against for added change files"
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  pr-number:
    description: "check mode: pull request number, recorded in the verdict"
    required: false
    default: ${{ github.event.pull_request.number }}
  go-version:
    description: Go version to use
    required: false
    default: '1.25'

outputs:
  tag:
    description: The tag that was created (empty when no tag was created)
    value: ${{ steps.run.outputs.tag }}
  version:
    description: >
      release/prerelease mode: the full computed version string (the tag without
      prefix), set even on the no-tag path where 'tag' is empty.
    value: ${{ steps.run.outputs.version }}
  next-version:
    description: >
      status mode: the next base version (MAJOR.MINOR.PATCH, no prerelease label).
      Computed on any branch since status has no branch-config dependency.
    value: ${{ steps.run.outputs.next-version }}
  previous-version:
    description: The prior stable base version (empty if there is no prior tag)
    value: ${{ steps.run.outputs.previous-version }}
  bump:
    description: "status mode: the computed bump level (patch, minor, major)"
    value: ${{ steps.run.outputs.bump }}
  prerelease:
    description: Whether the created tag is a prerelease
    value: ${{ steps.run.outputs.prerelease }}
  skip:
    description: true when there were no pending changes
    value: ${{ steps.run.outputs.skip }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run release tool
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        RELEASE_MODE: ${{ inputs.mode }}
        RELEASE_OUTPUT: ${{ inputs.output }}
        RELEASE_NOTES: ${{ inputs.notes-output }}
        WORKSPACE: ${{ github.workspace }}
        BASE_REF: ${{ inputs.base-ref }}
        BASE_SHA: ${{ inputs.base-sha }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        case "$RELEASE_MODE" in
          release)
            ARGS=(--root "$WORKSPACE" --output "$WORKSPACE/$RELEASE_OUTPUT")
            [ -n "$RELEASE_NOTES" ] && ARGS+=(--notes "$WORKSPACE/$RELEASE_NOTES")
            [ "$DRY_RUN" = "true" ] && ARGS+=(--dry-run)
            go run . release "${ARGS[@]}"
            ;;
          status)
            go run . status --root "$WORKSPACE"
            ;;
          check)
            go run . check --root "$WORKSPACE" \
              --base    "$BASE_REF" \
              --against "$BASE_SHA" \
              --pr      "$PR_NUMBER" \
              --out     "$WORKSPACE/release-check.json"
            ;;
          *)
            echo "Unknown mode: $RELEASE_MODE" >&2
            exit 1
            ;;
        esac
