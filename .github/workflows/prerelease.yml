name: Prerelease

on:
  push:
    branches:
      - master   # -> rc
      - develop  # -> alpha
      - beta     # -> beta

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Map branch name -> prerelease label and git-sha preference.
      # Add or remove branches here as your workflow evolves.
      - name: Resolve branch config
        id: cfg
        shell: bash
        run: |
          case "${{ github.ref_name }}" in
            master)  echo "label=rc"    >> "$GITHUB_OUTPUT"
                     echo "git_sha=true"  >> "$GITHUB_OUTPUT" ;;
            develop) echo "label=alpha"  >> "$GITHUB_OUTPUT"
                     echo "git_sha=true"  >> "$GITHUB_OUTPUT" ;;
            beta)    echo "label=beta"   >> "$GITHUB_OUTPUT"
                     echo "git_sha=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run release tool
        id: release
        uses: ./
        with:
          mode: rc
          prerelease-label: ${{ steps.cfg.outputs.label }}
          git-sha: ${{ steps.cfg.outputs.git_sha }}
          notes-output: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag
        if: steps.release.outputs.skip != 'true'
        run: git push origin ${{ steps.release.outputs.tag }}

      - name: Build release binaries
        if: steps.release.outputs.skip != 'true'
        run: |
          mkdir -p dist
          declare -A exts=([windows]=".exe")
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${platform%/*}" GOARCH="${platform#*/}"
            out="dist/release-tool-${GOOS}-${GOARCH}${exts[$GOOS]}"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "$out" .
          done

      - name: Create GitHub release
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes-file release-notes.md \
            --prerelease \
            dist/*
