name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - run: go build ./...
      - run: go test ./...

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Validate change files
        run: go run . status

      - name: Dry run stable
        run: go run . --dry-run stable

      - name: Dry run alpha
        run: go run . --dry-run --prerelease-label alpha stable

      - name: Dry run rc
        run: go run . --dry-run --prerelease-label rc stable
